# Semantische Versionen + CHANGELOG (konventionelle Commits) + GitHub Release
# Läuft nach erfolgreichem Workflow „CI“. Produktions-Deploy: deploy.yml bei Push auf main
# (nicht an Release gekoppelt — vermeidet doppelte Deploys wenn SR nichts publisht).
#
# Release-Commit geht per PR in den Default-Branch (geschützter main: kein Direktpush).
# Secret `RELEASE_GITHUB_TOKEN`: Fine-grained PAT mit Contents + Pull requests (Read/Write),
# Metadata read — sonst schlagen Push/PR/Merge fehl. Fallback: `GITHUB_TOKEN` (oft nicht ausreichend).
name: Release

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_fetch_retries: "7"
  npm_config_fetch_retry_mintimeout: "15000"
  npm_config_fetch_retry_maxtimeout: "120000"

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'Rathch/DSABrew' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    # Wie deploy-production: nur eine Release-Instanz gleichzeitig (Tags/Commits/GitHub Release).
    concurrency:
      group: release-production
      cancel-in-progress: false
    env:
      # Husky pre-push führt lokal „ci:quick“ aus (inkl. Playwright). Beim SR-git push läuft
      # derselbe Hook — im Release-Job gibt es keine Browser-Installation; CI ist ohnehin grün.
      HUSKY: "0"
      # Ein Token für Checkout (persist-credentials) und SR — sonst blockiert geschützter main.
      SR_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # Sonst sieht semantic-release ggf. keine v*-Tags → „erster Release“ = immer 1.0.0, obwohl schon Tags auf GitHub existieren.
          fetch-tags: true
          persist-credentials: true
          token: ${{ env.SR_GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          # Nur Root-Lockfile: hier läuft nur `npm ci` — web/server brauchen keine vollen node_modules.
          cache-dependency-path: package-lock.json

      - name: Install (root — semantic-release)
        run: npm ci

      - name: Git-Identität (Release-Commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # SR nutzt `git tag --merged <branch>` — bei detached HEAD fehlt oft refs/heads/master|main,
      # dann werden keine v*-Tags gefunden → fälschlich „erster Release“ 1.0.0 trotz v0.38.2 auf GitHub.
      - name: Lokaler Branch-Ref für semantic-release
        run: |
          B="${{ github.event.workflow_run.head_branch }}"
          git branch -f "$B" HEAD

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ env.SR_GITHUB_TOKEN }}
          GH_TOKEN: ${{ env.SR_GITHUB_TOKEN }}
        run: npx semantic-release
