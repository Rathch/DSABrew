name: Deploy Production

# Nur Push auf main (kein workflow_run nach Release — sonst doppelter Deploy).
on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  # Kein Abbruch laufender Deploys: sonst abbrechende Jobs können Prod halb aktualisiert lassen.
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'Rathch/DSABrew'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: rathch/dsabrew
      WEB_IMAGE_NAME: rathch/dsabrew-web
      DEPLOY_DIR: /opt/apps/dsabrew
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Missing secret: SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.GHCR_READ_USER }}" ]; then
            echo "::error::Missing secret: GHCR_READ_USER"
            missing=1
          fi
          if [ -z "${{ secrets.GHCR_READ_TOKEN }}" ]; then
            echo "::error::Missing secret: GHCR_READ_TOKEN"
            missing=1
          fi
          if [ -z "${{ secrets.SSH_HOST || vars.SSH_HOST }}" ]; then
            echo "::error::Missing SSH host: set secrets.SSH_HOST or vars.SSH_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.SSH_USER || vars.SSH_USER }}" ]; then
            echo "::error::Missing SSH user: set secrets.SSH_USER or vars.SSH_USER"
            missing=1
          fi
          if [ -z "${{ secrets.SSH_PORT || vars.SSH_PORT }}" ]; then
            echo "::error::Missing SSH port: set secrets.SSH_PORT or vars.SSH_PORT"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Extract web image metadata
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Upload deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          username: ${{ secrets.SSH_USER || vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT }}
          source: "deploy/docker-compose.prod.yml"
          target: "${{ env.DEPLOY_DIR }}"
          strip_components: 1
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          username: ${{ secrets.SSH_USER || vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT }}
          envs: IMAGE,WEB_IMAGE,GHCR_USER,GHCR_TOKEN,DEPLOY_DIR
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ ! -f ".env" ]; then
              echo ".env fehlt in $DEPLOY_DIR. Deployment abgebrochen."
              exit 1
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export IMAGE
            export WEB_IMAGE

            # docker-compose.prod.yml: externes Proxy-Netz (wie andere Stacks) — bei Bedarf anlegen.
            set -a
            # shellcheck disable=SC1091
            [ -f .env ] && . ./.env
            set +a
            _edge_net="${TRAEFIK_NETWORK:-proxy}"
            if ! docker network inspect "$_edge_net" >/dev/null 2>&1; then
              echo "Docker-Netzwerk '$_edge_net' fehlt — wird angelegt (Traefik sollte dasselbe Netz nutzen)."
              docker network create "$_edge_net"
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
