# CI: Typecheck, Build, Tests, CVE-Audit, Secret-Scanning, optional Secret-Präsenz
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "20"

jobs:
  web:
    name: Web (Typecheck, Test, Build, E2E)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            server/package-lock.json

      # Schritt-working-directory überschreibt defaults.run.working-directory (web/).
      # github.workspace = Checkout-Root — Root-package.json + scripts/lint-ts.mjs liegen dort.
      - name: npm ci (repository root — ESLint)
        working-directory: ${{ github.workspace }}
        run: npm ci

      - run: npm ci

      # lint-ts.mjs setzt cwd selbst aufs Repo-Root und lintet web/, shared/, server/ (eslint.config.mjs).
      - name: ESLint (TypeScript — web, shared, server)
        working-directory: ${{ github.workspace }}
        run: npm run lint:ts

      - name: TypeScript (strict)
        run: npx tsc --noEmit

      - name: Stylelint (CSS)
        run: npm run lint:css

      - name: Tests mit Abdeckung
        run: npm run test:coverage

      - name: Coverage-Bericht (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
          if-no-files-found: warn

      - name: Coverage in Job-Zusammenfassung
        working-directory: web
        run: |
          test -f coverage/coverage-summary.json || exit 0
          node <<'NODE'
          const fs = require("fs");
          const j = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8"));
          const t = j.total || {};
          const row = (k) => `| ${k} | ${t[k]?.pct ?? "–"} % |`;
          const md =
            "### Web-Testabdeckung (Vitest)\n\n| Metrik | Anteil |\n| --- | --- |\n" +
            `${row("lines")}\n${row("statements")}\n${row("functions")}\n${row("branches")}\n`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY || "/dev/stdout", md);
          NODE

      - name: Production build
        run: npm run build

      - name: Playwright (Browser installieren)
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: npm run test:e2e:ci

  e2e-integration:
    name: E2E (Integration — API-Server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            server/package-lock.json

      - name: npm ci (root, web, server)
        working-directory: ${{ github.workspace }}
        run: |
          npm ci
          npm ci --prefix web
          npm ci --prefix server

      - name: Web-Build (VITE_PUBLIC_API_BASE für API)
        env:
          VITE_PUBLIC_API_BASE: http://127.0.0.1:3001
        run: npm run build

      - name: Playwright (Browser installieren)
        run: npx playwright install --with-deps chromium

      - name: E2E Integration (ohne route-Mocks)
        run: npm run test:e2e:integration:ci

  server:
    name: Server (Typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: Tests (Node)
        run: npm run test

  # Hinweis: GitHub „Dependency Review“ (actions/dependency-review-action) braucht Dependency Graph
  # + bei privaten Repos GitHub Advanced Security — nicht dasselbe wie Dependabot. CVE-Check: dieser Job.
  dependency-audit:
    name: npm audit (CVEs)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [web, server]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - run: npm ci

      # Schwelle anpassen: low | moderate | high | critical
      - name: npm audit
        run: npm audit --audit-level=high

  secret-scan:
    name: Committed secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Major v2 ist aktuell (Stand 2026); es gibt kein offizielles gitleaks-action@v3.
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Prüft, ob festgelegte GitHub Action-Secrets gesetzt sind (Deploy, Releases).
  # 1) Repository variable CI_VERIFY_SECRETS = true
  # 2) Unten Secret-Namen an eure Settings → Secrets → Actions anpassen (oder Schritte duplizieren).
  verify-action-secrets:
    name: Erforderliche Repo-Secrets (optional)
    # Auf Fork-PRs stehen Repo-Secrets nicht zur Verfügung → Job überspringen
    if: >-
      vars.CI_VERIFY_SECRETS == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Pflicht-Secrets (Beispiel — Namen anpassen)
        env:
          # Beispiel: ein Secret, das für eure Deploy-/Release-Pipeline existieren muss
          DEPLOYMENT_SECRET: ${{ secrets.DEPLOYMENT_SECRET }}
        run: |
          if [ -z "$DEPLOYMENT_SECRET" ]; then
            echo "::error::Secret DEPLOYMENT_SECRET fehlt unter Settings → Secrets and variables → Actions."
            echo "::error::Passe den Job an (anderer Secret-Name) oder setze CI_VERIFY_SECRETS auf false."
            exit 1
          fi
          echo "DEPLOYMENT_SECRET ist gesetzt."

  # --- Deploy (VPS): nur bei Push auf main/master, nach erfolgreichen Web- + Server-Jobs ---
  # Repository → Settings → Secrets and variables → Actions:
  #   SSH_PRIVATE_KEY   — privater SSH-Key (Deploy-User auf dem VPS)
  #   DEPLOY_HOST       — Hostname oder IP des VPS
  #   DEPLOY_USER       — z. B. deployer
  #   DEPLOY_PATH       — absoluter Pfad zum Repo, z. B. /home/deployer/dsabrew
  # Optional (Variables):
  #   DEPLOY_SYSTEMD_UNIT — Default: dsabrew-api
  #   DEPLOY_SSH_PORT — SSH-Port (Default: 22)
  #   DEPLOY_SSH_PROTOCOL — tcp | tcp4 | tcp6 (Default: tcp) — bei IPv6-Problemen z. B. tcp4 testen
  # Auf dem Server: sudoers für „systemctl restart …“ ohne Passwort; git remote muss pull können.
  deploy:
    name: Deploy (VPS)
    needs: [web, server]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    steps:
      - name: Deploy — Diagnose (Runner-IP, DNS, TCP zum SSH-Port)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "::group::Runner / Job"
          echo "GITHUB_RUN_ID=$GITHUB_RUN_ID GITHUB_REF=$GITHUB_REF"
          uname -a || true
          echo "Outbound-IP (Runner, öffentlich): $(curl -fsS --max-time 10 https://api.ipify.org || echo 'n/a')"
          echo "::endgroup::"

          echo "::group::DEPLOY_HOST — Länge & DNS"
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::error::Secret DEPLOY_HOST ist leer."
            exit 1
          fi
          echo "Zeichenlänge DEPLOY_HOST: ${#DEPLOY_HOST}"
          echo "Ersten 12 Zeichen (zur Plausibilisierung): ${DEPLOY_HOST:0:12}…"
          getent ahosts "$DEPLOY_HOST" 2>/dev/null || true
          getent hosts "$DEPLOY_HOST" 2>/dev/null || true
          if command -v dig >/dev/null 2>&1; then
            dig +timeout=5 +tries=1 "$DEPLOY_HOST" A 2>/dev/null || true
            dig +timeout=5 +tries=1 "$DEPLOY_HOST" AAAA 2>/dev/null || true
          fi
          echo "::endgroup::"

          echo "::group::TCP $DEPLOY_HOST:$DEPLOY_SSH_PORT (wie drone-ssh / SSH-Client)"
          if command -v nc >/dev/null 2>&1; then
            if nc -zv -w 15 "$DEPLOY_HOST" "$DEPLOY_SSH_PORT" 2>&1; then
              echo "nc: Verbindungsaufbau OK"
            else
              echo "::warning::nc -zv fehlgeschlagen (Exit $?) — typisch Firewall/Provider oder falsche IP/Hostname."
            fi
          else
            echo "nc fehlt; versuche bash /dev/tcp"
            timeout 15 bash -c "echo >/dev/tcp/${DEPLOY_HOST}/${DEPLOY_SSH_PORT}" && echo "bash /dev/tcp: OK" || echo "::warning::bash /dev/tcp fehlgeschlagen"
          fi
          echo "::endgroup::"

      - name: SSH — Checkout, Build, API neu starten
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          protocol: ${{ vars.DEPLOY_SSH_PROTOCOL || 'tcp' }}
          timeout: 2m
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git reset --hard "origin/${{ github.ref_name }}"
            npm ci
            npm ci --prefix web
            npm ci --prefix server
            npm run build --prefix web
            sudo -n systemctl restart "${{ vars.DEPLOY_SYSTEMD_UNIT || 'dsabrew-api' }}"
