<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSABrew</title>
    <link rel="icon" href="/fan-produkt-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gentium+Book+Plus:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var k = "dsabrew-theme";
          var v = localStorage.getItem(k);
          if (v !== "light" && v !== "dark" && v !== "system") v = "system";
          var dark =
            v === "dark" ||
            (v === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <svg width="0" height="0" aria-hidden="true" style="position: absolute">
      <defs>
        <clipPath id="dsa-note-torn-clip" clipPathUnits="objectBoundingBox">
          <path
            d="M0,0.02 L0.1,0 L0.2,0.02 L0.3,0 L0.4,0.02 L0.5,0 L0.6,0.02 L0.7,0 L0.8,0.02 L0.9,0 L1,0.02 L1,0.12 L0.98,0.24 L1,0.36 L0.97,0.48 L1,0.6 L0.98,0.72 L1,0.84 L0.99,0.94 L1,1 L0.88,0.98 L0.75,1 L0.62,0.97 L0.5,1 L0.38,0.98 L0.25,1 L0.12,0.97 L0,1 L0.02,0.85 L0,0.68 L0.03,0.51 L0,0.34 L0.02,0.17 L0,0.03 Z"
          />
        </clipPath>
      </defs>
    </svg>
    <div id="app"></div>
    <aside
      id="dsabrew-privacy-strip"
      class="privacy-strip"
      role="dialog"
      aria-labelledby="privacy-strip-title"
      aria-modal="false"
      hidden
    >
      <div class="privacy-strip__inner">
        <p id="privacy-strip-title" class="privacy-strip__text">
          <strong>Keine Cookies, kein Tracking:</strong> DSABrew setzt keine Cookies und betreibt kein Tracking.
          Technische Hinweise zu Schriftarten und Speicherung finden Sie in der
          <a href="/datenschutz">Datenschutzerklärung</a>.
        </p>
        <button type="button" id="privacy-strip-dismiss" class="privacy-strip__btn">Verstanden</button>
      </div>
    </aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
